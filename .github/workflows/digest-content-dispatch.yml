name: Notify blog rebuild

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger blog deploy workflow
        env:
          BLOG_REPOSITORY: SYYANI/SYYANI.github.io
          GH_TOKEN: ${{ secrets.BLOG_REBUILD_TOKEN }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$BLOG_REPOSITORY/dispatches" \
            -d '{"event_type":"digest-updated"}'
