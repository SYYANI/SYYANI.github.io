name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  repository_dispatch:
    types: [digest-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DIGEST_CONTENT_DIR: ${{ github.workspace }}/../digest/content/digest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout digest content
        if: ${{ vars.DIGEST_REPOSITORY != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.DIGEST_REPOSITORY }}
          path: _external/digest
          token: ${{ secrets.DIGEST_REPO_TOKEN }}

      - name: Use external digest path
        if: ${{ vars.DIGEST_REPOSITORY != '' }}
        run: echo "DIGEST_CONTENT_DIR=${{ github.workspace }}/_external/digest/content/digest" >> "$GITHUB_ENV"
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Sync posts
        run: node sync.mjs
        env:
          GH_REPO: SYYANI/blog
          GH_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Validate digest source
        run: test -d "$DIGEST_CONTENT_DIR"
          
      - name: Hexo build
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
